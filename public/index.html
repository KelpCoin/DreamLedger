<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Ledger Deck</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #eee; text-align: center; padding: 2rem; }
    .card { max-width: 400px; margin: 2rem auto; background: #1a1a2e; padding: 2rem; border-radius: 16px; border: 1px solid #66ffcc; }
    img { max-width: 100%; border-radius: 12px; }
    button { background: #66ffcc; color: #0a0a0f; border: none; padding: 1rem 2rem; font-size: 1.1rem; border-radius: 50px; cursor: pointer; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Dream Ledger Deck</h1>
  <div class="card" id="product"></div>

  <script>
    async function loadProduct() {
      const res = await fetch('/api/catalog');
      const catalog = await res.json();
      const product = catalog[0];
      document.getElementById('product').innerHTML = `
        ${product.image ? `<img src="${product.image}" alt="Deck">` : ''}
        <h2>${product.title}</h2>
        <p>${product.description}</p>
        <p><strong>$${ (product.price / 100).toFixed(2) } NZD</strong></p>
        <button onclick="buyNow('${product.id}')">Buy Now</button>
      `;
    }

    async function buyNow(productId) {
      const res = await fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({productId})
      });
      const {url} = await res.json();
      if (url) window.location.href = url;
    }

    loadProduct();
  </script>
</body>
</html>
