<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DreamLedger  Alpha Signals</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #1a1a1a;
      --text: #e0e0e0;
      --accent: #00ff88;
      --btn: #ff3b3b;
      --btn-text: white;
      --heart: #ff4d6a;
      --swipe-left: #ff4757;
      --swipe-right: #2ed573;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    /* INFINITE CARD SWIPE (Tinderstyle) */
    .card-stack {
      position: relative;
      width: 90vw;
      max-width: 400px;
      height: 65vh;
      margin-bottom: 1rem;
    }
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
      cursor: grab;
      user-select: none;
    }
    .card:active { cursor: grabbing; }
    .card.dragging { transition: none; }
    .card.swiped-left { transform: translateX(-150%) rotate(-30deg); opacity: 0; }
    .card.swiped-right { transform: translateX(150%) rotate(30deg); opacity: 0; }
    .card .badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--accent);
      color: #000;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.8rem;
    }
    .card .price {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 1rem 0;
    }
    .card .social-proof {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0;
      font-size: 0.9rem;
      color: #aaa;
    }
    .card .scarcity {
      color: #ff3b3b;
      font-weight: bold;
    }
    .card .actions {
      margin-top: auto;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .btn {
      padding: 0.9rem 2rem;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-buy {
      background: var(--btn);
      color: var(--btn-text);
    }
    .btn-buy:hover { background: #e03333; }
    .btn-pass { background: #333; color: #aaa; }
    .btn-pass:hover { background: #555; }
    /* INFINITE SCROLL TRACK */
    .track {
      width: 90vw;
      max-width: 400px;
      margin-top: 0.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
    }
    .profile-dots {
      display: flex;
      justify-content: center;
      gap: 0.3rem;
      margin: 0.5rem 0;
    }
    .dot {
      width: 8px; height: 8px;
      background: #555;
      border-radius: 50%;
    }
    .dot.active { background: var(--accent); }
  </style>
</head>
<body>

<div class="card-stack" id="stack">
  <!-- Cards injected by JS -->
</div>

<div class="track">
  <div class="profile-dots" id="dots"></div>
  <span id="counter">0 / 0 signals</span>
</div>

<script src="catalog.json"></script>
<script>
  let items = [];
  let currentIndex = 0;
  const stack = document.getElementById('stack');

  async function loadCatalog() {
    const res = await fetch('/catalog.json');
    items = await res.json();
    if (!items.length) {
      stack.innerHTML = '<p style="padding:2rem">No signals yet. Drop revenue events into D:\\DreamLedger\\Daemon\\Revenue.</p>';
      return;
    }
    renderCards();
  }

  function renderCards() {
    stack.innerHTML = '';
    document.getElementById('dots').innerHTML = '';
    items.forEach((item, idx) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (idx === 0 ? ' active' : '');
      document.getElementById('dots').appendChild(dot);
    });
    document.getElementById('counter').innerText = `1 / ${items.length} signals`;
    showCard(0);
  }

  function showCard(index) {
    if (index >= items.length) {
      stack.innerHTML = '<div class="card" style="align-items:center;justify-content:center;text-align:center;"><h2> You\'ve seen all signals</h2><p>Come back later or check your DMs.</p></div>';
      return;
    }
    currentIndex = index;
    const item = items[index];
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-index', index);
    card.innerHTML = `
      <div class="badge">Score ${item.score}</div>
      <h2>${item.title}</h2>
      <div class="price">$${(item.price / 100).toFixed(2)}</div>
      <div class="social-proof"> 17 people viewing now</div>
      <div class="scarcity"> Only ${item.scarcity} left</div>
      <div class="actions">
        <button class="btn btn-pass" onclick="swipe('left', this.parentElement.parentElement)"> Pass</button>
        <button class="btn btn-buy" onclick="swipe('right', this.parentElement.parentElement)"> Buy</button>
      </div>
    `;
    // Touch / drag
    let startX = 0, deltaX = 0;
    card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; card.classList.add('dragging'); });
    card.addEventListener('touchmove', e => { deltaX = e.touches[0].clientX - startX; card.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.05}deg)`; });
    card.addEventListener('touchend', () => {
      card.classList.remove('dragging');
      if (deltaX > 50) swipe('right', card);
      else if (deltaX < -50) swipe('left', card);
      else card.style.transform = '';
    });
    // Mouse drag
    card.addEventListener('mousedown', e => { startX = e.clientX; card.classList.add('dragging'); });
    window.addEventListener('mousemove', e => {
      if (card.classList.contains('dragging')) {
        deltaX = e.clientX - startX;
        card.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.05}deg)`;
      }
    });
    window.addEventListener('mouseup', () => {
      if (card.classList.contains('dragging')) {
        card.classList.remove('dragging');
        if (deltaX > 50) swipe('right', card);
        else if (deltaX < -50) swipe('left', card);
        else card.style.transform = '';
      }
    });
    stack.appendChild(card);
    updateDots(index);
  }

  function swipe(direction, card) {
    const next = currentIndex + 1;
    const item = items[currentIndex];
    card.classList.add(direction === 'right' ? 'swiped-right' : 'swiped-left');
    setTimeout(() => {
      card.remove();
      if (direction === 'right') {
        buyItem(item);
      }
      showCard(next);
      document.getElementById('counter').innerText = `${next+1} / ${items.length} signals`;
      updateDots(next);
    }, 300);
  }

  function updateDots(idx) {
    const dots = document.querySelectorAll('.dot');
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  async function buyItem(item) {
    try {
      const res = await fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({id: item.id, amount: item.price})
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert('Checkout error: ' + data.error);
      }
    } catch (e) {
      alert('Network error: ' + e.message);
    }
  }

  loadCatalog();
</script>
</body>
</html>
