<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamLedger  Commander Decks</title>
<meta name="description" content="Built Commander decks, ready to play. NZ built, NZ shipping.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --card: #F1EDE1; --ink: #1B1815; --ink-soft: #5A5346; --line: #D8D0BC;
    --foil: #6B4FA0; --foil-dark: #543C82; --sticker: #C1511F;
    --w: #F7F4E9; --u: #4E7FB0; --b: #3A342E; --r: #B0432E; --g: #4F7A4A;
    --display: 'Fraunces', serif; --sans: 'IBM Plex Sans', system-ui, sans-serif; --mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--ink); color: var(--card); font-family: var(--sans); }
  a, button { color: inherit; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  header { padding: 40px 0 24px; border-bottom: 1px solid rgba(247,244,233,0.15); }
  .pips { display: flex; gap: 6px; margin-bottom: 18px; }
  .pip { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid rgba(247,244,233,0.4); }
  .pip.w { background: var(--w); } .pip.u { background: var(--u); } .pip.b { background: var(--b); } .pip.r { background: var(--r); } .pip.g { background: var(--g); }
  h1 { font-family: var(--display); font-weight: 700; font-size: clamp(30px, 5vw, 44px); margin: 0 0 10px; letter-spacing: -0.01em; }
  .tagline { font-size: 16px; color: rgba(247,244,233,0.7); max-width: 54ch; margin: 0; }
  .count { font-family: var(--mono); font-size: 12px; color: rgba(247,244,233,0.5); padding: 20px 0 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; padding: 12px 0 60px; }
  .deck-card { background: var(--card); color: var(--ink); border-radius: 4px; position: relative; display: flex; flex-direction: column; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
  .deck-art { height: 150px; background: linear-gradient(135deg, var(--foil), var(--foil-dark)); border-radius: 4px 4px 0 0; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 12px; color: rgba(247,244,233,0.7); text-align: center; padding: 10px; overflow: hidden; }
  .deck-art img { width: 100%; height: 100%; object-fit: cover; }
  .price-sticker { position: absolute; top: 10px; right: 10px; background: var(--sticker); color: var(--card); font-family: var(--mono); font-weight: 600; font-size: 13px; padding: 5px 9px; border-radius: 3px; transform: rotate(4deg); box-shadow: 2px 2px 0 rgba(0,0,0,0.25); }
  .deck-body { padding: 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .deck-name { font-family: var(--display); font-weight: 700; font-size: 18px; margin: 0; }
  .deck-blurb { font-size: 13px; color: var(--ink-soft); flex: 1; margin: 0; }
  .deck-cta { display: inline-block; text-align: center; margin-top: 4px; background: var(--ink); color: var(--card); font-family: var(--mono); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; border: none; padding: 10px; border-radius: 3px; cursor: pointer; width: 100%; }
  .deck-cta:hover { background: var(--foil); }
  .deck-cta:disabled { background: var(--ink-soft); cursor: wait; }
  .deck-cta:focus-visible { outline: 3px solid var(--foil); outline-offset: 2px; }
  .error-msg { font-family: var(--mono); font-size: 13px; color: var(--sticker); padding: 20px 0; }
  footer { border-top: 1px solid rgba(247,244,233,0.15); padding: 24px 0 48px; font-family: var(--mono); font-size: 11.5px; color: rgba(247,244,233,0.45); text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="pips">
      <div class="pip w"></div><div class="pip u"></div><div class="pip b"></div><div class="pip r"></div><div class="pip g"></div>
    </div>
    <h1>Built Commander decks, ready to play.</h1>
    <p class="tagline">Full 100-card EDH decks, tuned and sleeved, shipped from New Zealand.</p>
  </header>

  <div class="count" id="count">Loading catalog</div>
  <div class="grid" id="grid"></div>

  <footer>DreamLedger  Payments via Stripe</footer>
</div>

<script>
  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count");

  async function loadCatalog() {
    try {
      const res = await fetch("/api/catalog");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const products = await res.json();

      if (!products.length) {
        countEl.textContent = "No decks currently listed. Check back soon.";
        return;
      }

      countEl.textContent = `${products.length} decks available`;
      grid.innerHTML = products.map(p => `
        <div class="deck-card">
          <div class="price-sticker">$${(p.price / 100).toFixed(2)}</div>
          <div class="deck-art">${p.image ? `<img src="${p.image}" alt="${p.title}">` : p.title}</div>
          <div class="deck-body">
            <h3 class="deck-name">${p.title}</h3>
            <p class="deck-blurb">${p.description || ""}</p>
            <button class="deck-cta" data-id="${p.id}">Buy this deck</button>
          </div>
        </div>
      `).join("");

      grid.querySelectorAll(".deck-cta").forEach(btn => {
        btn.addEventListener("click", () => startCheckout(btn));
      });

    } catch (err) {
      countEl.textContent = "";
      grid.innerHTML = `<div class="error-msg">Could not load the catalog (${err.message}). Try refreshing  if it keeps failing, check that catalog.json is present and valid on the server.</div>`;
    }
  }

  async function startCheckout(btn) {
    const productId = btn.dataset.id;
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = "Redirecting";

    try {
      const res = await fetch("/api/checkout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product_id: productId }),
      });
      const data = await res.json();
      if (!res.ok || !data.url) throw new Error(data.error || `HTTP ${res.status}`);
      window.location.href = data.url;
    } catch (err) {
      btn.disabled = false;
      btn.textContent = originalText;
      alert(`Checkout failed: ${err.message}`);
    }
  }

  loadCatalog();
</script>

</body>
</html>
