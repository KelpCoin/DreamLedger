name: DreamLedger Spine

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ledger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize ledger directory
        run: |
          mkdir -p .dreamledger
          echo '{"status":"init","ts":"'$(date -u +%s)'"}' > .dreamledger/bootstrap.json

      - name: Run DreamLedger spine script (if exists)
        run: |
          if [ -f "scripts/dreamledger-spine.js" ]; then
            node scripts/dreamledger-spine.js
          else
            echo "No spine script found - continuing in minimal mode"
          fi

      - name: Write CI proof artifact
        run: |
          mkdir -p .dreamledger
          echo "ledger_ok=$(date -u +%s)" > .dreamledger/proof.txt
          echo "commit=${GITHUB_SHA}" >> .dreamledger/proof.txt

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamledger-proof
          path: .dreamledger/proof.txt