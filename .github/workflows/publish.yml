name: DreamLedger MTG Publish
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
concurrency:
  group: dreamledger-mtg-publish
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Publish approved assets
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: python scripts/publish_from_notion.py
      - name: Validate DeckLock
        run: python scripts/validate_decklock.py
      - name: Verify ledger
        run: python scripts/verify_ledger.py
      - name: Build static site
        run: python scripts/generate_site.py
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-publish approved"
          file_pattern: "passports/* proofs/* ledger/* content/* registry/* MANIFEST.json _site/*"
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
