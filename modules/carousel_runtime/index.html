<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamLedger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0f0f0;font-family:system-ui}
.site-header{position:sticky;top:0;z-index:300;background:#0a0a0a;border-bottom:1px solid #1a1a2e;padding:8px 20px;display:flex;align-items:center;gap:12px}
.site-header svg{height:40px;width:auto}
.site-header .brand-text{font-size:1.1em;font-weight:bold;color:#fff;letter-spacing:1px}
.ticker-bar{background:#111;border-bottom:2px solid #0ff;padding:8px 0;overflow:hidden;white-space:nowrap;position:sticky;top:56px;z-index:200}
.ticker-content{display:inline-block;animation:scroll 30s linear infinite;font-size:0.85em;color:#0ff}
.ticker-content span{margin-right:60px}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.silo-section{padding:20px}
.silo-title{font-size:1.1em;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px}
.silo-title.mtg{color:#f0f}
.silo-title.general{color:#0ff}
.carousel-row{display:flex;overflow-x:auto;gap:15px;padding-bottom:10px}
.card{min-width:220px;background:#1a1a2e;border-radius:12px;padding:15px;border:1px solid #222;cursor:pointer;transition:transform 0.2s}
.card:hover{transform:scale(1.03);border-color:#0ff}
.card h3{font-size:1em;margin-bottom:5px}
.card .price{font-size:1.3em;color:#0ff;margin:8px 0}
.card .desc{font-size:0.8em;opacity:0.7}
.card button{width:100%;padding:8px;background:#0ff;color:#000;border:none;border-radius:6px;font-weight:bold;cursor:pointer;margin-top:10px}
.avatar-panel{position:fixed;bottom:20px;right:20px;background:#111;border:1px solid #0ff;border-radius:12px;padding:15px;z-index:200;max-width:250px}
.avatar-panel h3{font-size:1em;color:#0ff}
.avatar-panel input{width:100%;padding:8px;margin:5px 0;background:#222;border:1px solid #333;color:#fff;border-radius:4px}
.avatar-panel button{width:100%;padding:8px;background:#f0f;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-top:5px}
.avatar-panel .avatar-preview{text-align:center;font-size:2em;margin:10px 0}
.avatar-panel .game-link{display:block;text-align:center;color:#0ff;margin-top:8px;font-size:0.8em;cursor:pointer}
</style>
</head>
<body>
<div class="site-header">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="80" height="40">
    <defs><linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00d2ff"/><stop offset="30%" stop-color="#7b2ffc"/><stop offset="70%" stop-color="#ff007f"/><stop offset="100%" stop-color="#ffd700"/></linearGradient></defs>
    <rect width="800" height="400" fill="#0a0a0a"/>
    <g transform="translate(180,80)"><path d="M0,0 L30,0 L30,95 L120,95 L120,120 L0,120 Z M30,25 A35,35 0 1,1 30,90 L30,70 A15,15 0 1,0 30,45 Z" fill="url(#rainbow)"/></g>
  </svg>
  <span class="brand-text">DreamLedger</span>
</div>
<div class="ticker-bar"><div class="ticker-content" id="ticker"> connecting live feed...</div></div>
<div class="silo-section"><h2 class="silo-title mtg"> MTG / Commander</h2><div class="carousel-row" id="mtg-cards"></div></div>
<div class="silo-section"><h2 class="silo-title general"> General Products</h2><div class="carousel-row" id="general-cards"></div></div>
<div class="avatar-panel" id="avatar-panel">
  <h3> Create Your Avatar</h3>
  <div class="avatar-preview" id="avatar-display"></div>
  <input type="text" id="avatar-name" placeholder="Avatar name">
  <button onclick="createAvatar()">Create Avatar</button>
  <div id="avatar-stats" style="font-size:0.7em;opacity:0.7;margin-top:5px"></div>
  <span class="game-link" onclick="exportToGame()"> Export to Game</span>
</div>
<script>
const API = 'http://localhost:4000';
let currentUser = 'visitor_' + (crypto.randomUUID ? crypto.randomUUID() : Date.now());
fetch(API + '/catalog').then(r=>r.json()).then(items=>{
  window.__CATALOG = items;
  const mtg = items.filter(i=>(i.id&&(i.id.includes('mtg')||i.id.includes('commander')))||(i.title&&i.title.toLowerCase().includes('mtg')));
  const mtgIds = new Set(mtg.map(i=>i.id));
  const general = items.filter(i=>!mtgIds.has(i.id));
  renderCards('mtg-cards',mtg);
  renderCards('general-cards',general);
});
function renderCards(containerId,items){
  document.getElementById(containerId).innerHTML = items.map(i=>`<div class="card" data-sku="${i.id}"><h3>${i.title||i.name||i.id}</h3><p class="desc">${i.description||''}</p><p class="price">$${i.price}</p><button onclick="buy('${i.id}')">Buy</button></div>`).join('');
}
function buy(sku){
  const items = window.__CATALOG||[];
  const item = items.find(i=>i.id===sku);
  if(!item){alert('Item not found');return;}
  const url = item.stripe||item.checkout_url;
  if(!url){alert('Checkout not configured');return;}
  window.location.assign(url);
}
function updateTicker(){
  document.getElementById('ticker').innerHTML = '<span> store is live  scan to browse</span>';
}
setInterval(updateTicker,10000);updateTicker();
const AVATAR_KEY='dl_avatar';
let avatar=JSON.parse(localStorage.getItem(AVATAR_KEY)||'null');
function loadAvatar(){
  if(avatar){
    document.getElementById('avatar-name').value=avatar.name||'';
    document.getElementById('avatar-display').textContent=avatar.icon||'';
    document.getElementById('avatar-stats').innerHTML='Tier: '+(avatar.tier||'Seed')+' | Items: '+(avatar.items||[]).length;
  }
}
loadAvatar();
function createAvatar(){
  const name=document.getElementById('avatar-name').value.trim();
  if(!name){alert('Enter an avatar name');return;}
  const icons=['','','','','',''];
  avatar={id:'av_'+Date.now(),name:name,icon:icons[Math.floor(Math.random()*icons.length)],tier:'Seed',items:[],userId:currentUser,created:new Date().toISOString()};
  localStorage.setItem(AVATAR_KEY,JSON.stringify(avatar));
  fetch(API+'/api/avatar/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(avatar)}).catch(()=>{});
  loadAvatar();
}
function exportToGame(){
  if(!avatar){alert('Create an avatar first');return;}
  const gameData={avatarId:avatar.id,name:avatar.name,icon:avatar.icon,tier:avatar.tier,items:avatar.items,userId:currentUser,exportedAt:new Date().toISOString()};
  localStorage.setItem('dl_game_character',JSON.stringify(gameData));
  fetch(API+'/api/game/export-character',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(gameData)}).then(()=>alert(' Character exported!')).catch(()=>alert('Character saved locally.'));
}
</script>
</body>
</html>
