<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DreamLedger  Live Carousel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0c; color:#f0f0f0; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; overflow-x:hidden; }
    .micro-cta {
      position:fixed; top:12px; right:12px; z-index:200;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(12px);
      padding:6px 14px; border-radius:20px; color:#0ff; font-size:0.8rem;
      border:1px solid #0ff; cursor:pointer; transition:all 0.2s;
    }
    .micro-cta:hover { background:#0ff; color:#000; }
    .hero-swiper { width:100vw; height:80vh; margin-bottom:10px; }
    .hero-swiper .swiper-slide {
      display:flex; flex-direction:column; justify-content:flex-end;
      padding:40px 24px 24px; position:relative;
      background-size:cover; background-position:center;
      border-radius:0 0 24px 24px; overflow:hidden;
    }
    .hero-slide-content { position:relative; z-index:2; }
    .hero-slide-content h2 { font-size:2rem; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
    .hero-slide-content .ticker { font-size:0.8rem; opacity:0.8; margin-bottom:10px; height:20px; overflow:hidden; }
    .hero-slide-content .ticker span { display:block; }
    .hero-slide-content .cta-btn {
      display:inline-block; background:#0ff; color:#000; font-weight:bold;
      padding:10px 24px; border-radius:24px; text-decoration:none; font-size:0.9rem;
      margin-right:8px; cursor:pointer; border:none;
    }
    .hero-slide-content .cta-btn:hover { background:#fff; box-shadow:0 0 15px #0ff; }
    .nested-rows { padding:0 16px; }
    .nested-row { margin-bottom:24px; }
    .nested-row h3 { font-size:1rem; margin-bottom:8px; color:#aaa; text-transform:uppercase; letter-spacing:1px; }
    .nested-swiper { width:100%; }
    .nested-swiper .swiper-slide {
      width:140px; background:#15151e; border-radius:12px; padding:12px;
      text-align:center; cursor:pointer; transition:transform 0.2s;
      border:1px solid #1e1e2a;
    }
    .nested-swiper .swiper-slide:hover { transform:scale(1.05); border-color:#0ff; }
    .nested-swiper .swiper-slide .price { color:#0ff; font-size:0.8rem; margin-top:4px; }
    .nested-swiper .swiper-slide .buy-btn {
      margin-top:6px; background:#0ff; color:#000; border:none; padding:4px 12px;
      border-radius:12px; font-size:0.7rem; cursor:pointer; width:100%;
    }
    .bg-mtg { background:linear-gradient(135deg,#1a0a2e,#0d1b2a); }
    .bg-avatar { background:linear-gradient(135deg,#2e0a1a,#1a0a2e); }
    .bg-dreamledger { background:linear-gradient(135deg,#0a1a2e,#0a0a1a); }
    .bg-gameworld { background:linear-gradient(135deg,#1a2e0a,#0a1a0a); }
  </style>
</head>
<body>
  <div class="micro-cta" onclick="openAvatarForge()"> Free Avatar</div>

  <div class="swiper hero-swiper" id="heroSwiper">
    <div class="swiper-wrapper" id="heroWrapper"></div>
    <div class="swiper-pagination"></div>
  </div>

  <div class="nested-rows" id="nestedContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const fallbackData = {
      silos: [
        {
          id: 'mtg', title: 'MTG / Commander',
          tickerItems: ['New deck uploaded','Price matrix updated','5 cards added to vault'],
          ctaText: 'Browse MTG', ctaLink: '/mtg', bgClass: 'bg-mtg',
          products: [
            { name:'Commander Deck Primer', price:'$4.99', img:'' },
            { name:'Price Signal Pack', price:'$2.99', img:'' }
          ],
          trending: [
            { name:'Undervalued Picks', price:'$3.99', img:'' }
          ]
        },
        {
          id: 'avatar', title: 'Avatar Forge',
          tickerItems: ['14 avatars forged','New species unlocked','Creator pack released'],
          ctaText: 'Build Avatar', ctaLink: '/avatar', bgClass: 'bg-avatar',
          products: [
            { name:'Custom Avatar Slot', price:'$9.99', img:'' },
            { name:'Species Pack', price:'$4.99', img:'' }
          ],
          trending: [
            { name:'Legendary Skin', price:'$19.99', img:'' }
          ]
        },
        {
          id: 'dreamledger', title: 'DreamLedger',
          tickerItems: ['Memory shard added','World fragment uploaded','Vault synchronized'],
          ctaText: 'Enter Ledger', ctaLink: '/ledger', bgClass: 'bg-dreamledger',
          products: [
            { name:'Memory Vault', price:'$1.99', img:'' },
            { name:'Fragment Analyzer', price:'$5.99', img:'' }
          ],
          trending: [
            { name:'Archive Access', price:'$7.99', img:'' }
          ]
        },
        {
          id: 'gameworld', title: 'Game World',
          tickerItems: ['Region preview released','Creature archive expanded','Alpha invite wave 2 sent'],
          ctaText: 'Explore World', ctaLink: '/game', bgClass: 'bg-gameworld',
          products: [
            { name:'Alpha Key', price:'$29.99', img:'' },
            { name:'Lore Book', price:'$14.99', img:'' }
          ],
          trending: [
            { name:'Map Fragment', price:'$9.99', img:'' }
          ]
        }
      ]
    };

    let siloData;

    async function loadData() {
      try {
        const res = await fetch('/api/carousel-data');
        if (res.ok) siloData = await res.json();
        else siloData = fallbackData;
      } catch(e) { siloData = fallbackData; }
      buildUI();
    }

    function buildUI() {
      const heroWrapper = document.getElementById('heroWrapper');
      heroWrapper.innerHTML = '';
      siloData.silos.forEach(silo => {
        const slide = document.createElement('div');
        slide.className = `swiper-slide ${silo.bgClass}`;
        slide.innerHTML = `
          <div class="hero-slide-content">
            <h2>${silo.title}</h2>
            <div class="ticker" id="ticker-${silo.id}"><span>${silo.tickerItems[0]}</span></div>
            <button class="cta-btn" onclick="navigateTo('${silo.ctaLink}')">${silo.ctaText}</button>
            <button class="cta-btn" style="background:transparent;border:1px solid #0ff;color:#0ff;" onclick="openQuickView('${silo.id}')">Quick View</button>
          </div>
        `;
        heroWrapper.appendChild(slide);
      });

      new Swiper('#heroSwiper', {
        slidesPerView: 1, spaceBetween: 0, centeredSlides: true,
        pagination: { el: '.swiper-pagination', clickable: true },
        on: { slideChange: function() { updateActiveSilo(this.activeIndex); } }
      });
      updateActiveSilo(0);
    }

    function updateActiveSilo(index) {
      const silo = siloData.silos[index];
      if (!silo) return;
      startTicker(silo.id, silo.tickerItems);
      const container = document.getElementById('nestedContainer');
      container.innerHTML = '';
      if (silo.trending) container.appendChild(createNestedRow('Trending', silo.trending));
      if (silo.products) container.appendChild(createNestedRow('New Drops', silo.products));
      container.appendChild(createNestedRow('Upcoming', [
        { name:'Mystery Drop', price:'$?', img:'' },
        { name:'Limited Edition', price:'$?', img:'' }
      ]));
    }

    function createNestedRow(title, items) {
      const row = document.createElement('div');
      row.className = 'nested-row';
      row.innerHTML = `<h3>${title}</h3><div class="swiper nested-swiper"><div class="swiper-wrapper"></div></div>`;
      const wrapper = row.querySelector('.swiper-wrapper');
      items.forEach(item => {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = `
          <div style="font-size:2em;">${item.img||''}</div>
          <div>${item.name}</div>
          <div class="price">${item.price}</div>
          <button class="buy-btn" onclick="buyItem('${item.name}')">Buy</button>
        `;
        wrapper.appendChild(slide);
      });
      setTimeout(() => { new Swiper(row.querySelector('.nested-swiper'), { slidesPerView:'auto', spaceBetween:12, freeMode:true }); }, 50);
      return row;
    }

    function startTicker(siloId, items) {
      const el = document.getElementById(`ticker-${siloId}`);
      if (!el || !items.length) return;
      let i = 0;
      setInterval(() => { el.innerHTML = `<span>${items[i]}</span>`; i = (i+1) % items.length; }, 3000);
    }

    function navigateTo(url) { window.location.href = url; }
    function openQuickView(id) { alert(`Quick view: ${id}`); }
    function openAvatarForge() { document.querySelector('#heroSwiper').swiper.slideTo(1); }
    function buyItem(name) { alert(`Checkout: ${name}`); }
    loadData();
  </script>
</body>
</html>
