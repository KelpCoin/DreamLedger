<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamLedger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#eee;font-family:'Segoe UI',sans-serif}
header{background:#111;padding:1rem;display:flex;justify-content:space-between;align-items:center}
h1{font-size:1.5rem}
.auth{display:flex;gap:0.5rem}
input,button{padding:0.5rem 1rem;border-radius:6px;border:none}
input{background:#1a1a2e;color:#eee}
button{background:#66ffcc;color:#0a0a0f;cursor:pointer}
.silo-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;padding:1rem;gap:1rem}
.silo-card{min-width:300px;background:#15151e;border-radius:16px;padding:1.5rem;scroll-snap-align:start;border:1px solid #2a2a35}
.silo-card h2{font-size:1.3rem;margin-bottom:0.5rem}
.ticker{font-size:0.8rem;color:#888;margin-bottom:1rem}
.product{background:#1e1e2a;padding:0.5rem 1rem;border-radius:8px;margin:0.5rem 0;display:flex;justify-content:space-between}
.trending{color:#66ffcc;font-size:0.9rem;margin-top:1rem}
</style>
</head>
<body>
<header>
  <h1> DreamLedger</h1>
  <div class="auth" id="auth">
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Log In</button>
  </div>
</header>
<div class="silo-carousel" id="carousel"></div>
<script>
async function loadCarousel(){
  const res = await fetch('/api/carousel-data');
  const data = await res.json();
  const carousel = document.getElementById('carousel');
  carousel.innerHTML = data.silos.map(s => `
    <div class="silo-card">
      <h2>${s.title}</h2>
      <div class="ticker">${s.tickerItems[0]}</div>
      ${s.products.map(p => `<div class="product"><span>${p.name}</span><span>$${p.price}</span></div>`).join('')}
      <div class="trending"> Trending: ${s.trending.map(t=>t.name).join(', ')}</div>
    </div>
  `).join('');
}
async function signup(){
  const u=document.getElementById('user').value;
  const p=document.getElementById('pass').value;
  const res=await fetch('/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await res.json();
  alert(d.ok?'Signed up':'Error: '+d.error);
}
async function login(){
  const u=document.getElementById('user').value;
  const p=document.getElementById('pass').value;
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await res.json();
  alert(d.ok?'Logged in':'Error: '+d.error);
}
loadCarousel();
</script>
</body>
</html>
