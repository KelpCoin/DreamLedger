<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DreamLedger  Live Carousel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0c; color:#f0f0f0; font-family:'Segoe UI',system-ui,sans-serif; overflow-x:hidden; }
.micro-cta { position:fixed; top:12px; right:12px; z-index:200; background:rgba(0,0,0,0.75); backdrop-filter:blur(12px); padding:6px 14px; border-radius:20px; color:#0ff; font-size:0.8rem; border:1px solid #0ff; cursor:pointer; }
.hero-swiper { width:100vw; height:70vh; position:relative; overflow:hidden; }
.hero-track { display:flex; transition:transform 0.3s ease; height:100%; }
.hero-slide { min-width:100vw; height:100%; display:flex; flex-direction:column; justify-content:flex-end; padding:40px 24px 24px; background-size:cover; background-position:center; border-radius:0 0 24px 24px; }
.hero-slide h2 { font-size:2rem; margin-bottom:6px; text-transform:uppercase; }
.hero-slide .ticker { font-size:0.8rem; opacity:0.8; margin-bottom:10px; height:20px; }
.hero-slide .cta-btn { display:inline-block; background:#0ff; color:#000; font-weight:bold; padding:10px 24px; border-radius:24px; text-decoration:none; font-size:0.9rem; margin-right:8px; cursor:pointer; border:none; }
.hero-slide .cta-btn.outline { background:transparent; border:1px solid #0ff; color:#0ff; }
.nested-rows { padding:16px; }
.nested-row { margin-bottom:24px; }
.nested-row h3 { font-size:1rem; margin-bottom:8px; color:#aaa; text-transform:uppercase; }
.row-scroll { display:flex; overflow-x:auto; gap:12px; padding-bottom:8px; }
.row-card { min-width:140px; background:#15151e; border-radius:12px; padding:12px; text-align:center; border:1px solid #1e1e2a; cursor:pointer; }
.row-card .price { color:#0ff; font-size:0.8rem; margin-top:4px; }
.row-card .buy-btn { margin-top:6px; background:#0ff; color:#000; border:none; padding:4px 12px; border-radius:12px; font-size:0.7rem; cursor:pointer; width:100%; }
.bg-mtg { background:linear-gradient(135deg,#1a0a2e,#0d1b2a); }
.bg-avatar { background:linear-gradient(135deg,#2e0a1a,#1a0a2e); }
.bg-dreamledger { background:linear-gradient(135deg,#0a1a2e,#0a0a1a); }
.bg-gameworld { background:linear-gradient(135deg,#1a2e0a,#0a1a0a); }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:300; }
.modal.active { display:flex; }
.modal-content { background:#111; padding:24px; border-radius:12px; width:90%; max-width:400px; }
.modal-content h3 { color:#0ff; margin-bottom:12px; }
.modal-content input { width:100%; padding:8px; margin:6px 0; background:#222; border:1px solid #333; color:#fff; border-radius:4px; }
.modal-content button { width:100%; padding:10px; background:#f0f; color:#fff; border:none; border-radius:6px; cursor:pointer; margin-top:8px; }
</style>
</head>
<body>
<div class="micro-cta" onclick="openAvatarModal()"> Free Avatar</div>

<div class="hero-swiper" id="heroSwiper">
  <div class="hero-track" id="heroTrack"></div>
</div>

<div class="nested-rows" id="nestedContainer"></div>

<!-- Avatar modal -->
<div class="modal" id="avatarModal">
  <div class="modal-content">
    <h3>Create Your Avatar</h3>
    <input type="text" id="avatarName" placeholder="Avatar name">
    <button onclick="createAvatarNow()">Create</button>
    <button style="background:#333; margin-top:4px;" onclick="closeAvatarModal()">Cancel</button>
  </div>
</div>

<script>
let siloData = null;
let currentSlide = 0;
const heroTrack = document.getElementById('heroTrack');

// Touch / swipe handling
let touchStartX = 0, touchEndX = 0;
heroTrack.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
heroTrack.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
        if (diff > 0 && currentSlide < siloData.silos.length-1) currentSlide++;
        else if (diff < 0 && currentSlide > 0) currentSlide--;
        updateHero();
    }
});
// Mouse drag fallback
let isDragging = false, startX = 0;
heroTrack.addEventListener('mousedown', e => { isDragging=true; startX=e.clientX; heroTrack.style.cursor='grabbing'; });
heroTrack.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging=false; heroTrack.style.cursor='grab';
    const diff = startX - e.clientX;
    if (Math.abs(diff) > 50) {
        if (diff > 0 && currentSlide < siloData.silos.length-1) currentSlide++;
        else if (diff < 0 && currentSlide > 0) currentSlide--;
        updateHero();
    }
});
heroTrack.addEventListener('mouseleave', () => { if(isDragging){ isDragging=false; heroTrack.style.cursor='grab'; } });

function updateHero() {
    heroTrack.style.transform = `translateX(-${currentSlide * 100}vw)`;
    updateActiveSilo(currentSlide);
}

function navigateTo(url) { window.location.href = url; }

// Fetch data from server
async function loadData() {
    try {
        const res = await fetch('/api/carousel-data');
        if (res.ok) siloData = await res.json();
        else siloData = {
            silos: [
                { id:'mtg', title:'MTG / Commander', tickerItems:['New deck uploaded','Price matrix updated'], ctaText:'Browse MTG', ctaLink:'/mtg', bgClass:'bg-mtg',
                  products:[{name:'Commander Deck Primer',price:'$4.99',stripe:'https://buy.stripe.com/REPLACE_ME'},{name:'Price Signal Pack',price:'$2.99',stripe:'https://buy.stripe.com/REPLACE_ME'}],
                  trending:[{name:'Undervalued Picks',price:'$3.99',stripe:'https://buy.stripe.com/REPLACE_ME'}] },
                { id:'avatar', title:'Avatar Forge', tickerItems:['14 avatars forged','New species unlocked'], ctaText:'Build Avatar', ctaLink:'/avatar', bgClass:'bg-avatar',
                  products:[{name:'Custom Avatar Slot',price:'$9.99',stripe:null},{name:'Species Pack',price:'$4.99',stripe:null}],
                  trending:[{name:'Legendary Skin',price:'$19.99',stripe:null}] },
                { id:'dreamledger', title:'DreamLedger', tickerItems:['Memory shard added','Vault synchronized'], ctaText:'Enter Ledger', ctaLink:'/ledger', bgClass:'bg-dreamledger',
                  products:[{name:'Memory Vault',price:'$1.99',stripe:null},{name:'Fragment Analyzer',price:'$5.99',stripe:null}],
                  trending:[{name:'Archive Access',price:'$7.99',stripe:null}] },
                { id:'gameworld', title:'Game World', tickerItems:['Region preview released','Alpha invite wave 2 sent'], ctaText:'Explore World', ctaLink:'/game', bgClass:'bg-gameworld',
                  products:[{name:'Alpha Key',price:'$29.99',stripe:null},{name:'Lore Book',price:'$14.99',stripe:null}],
                  trending:[{name:'Map Fragment',price:'$9.99',stripe:null}] }
            ]
        };
    }
    buildUI();
}

function buildUI() {
    heroTrack.innerHTML = '';
    siloData.silos.forEach((silo, idx) => {
        const slide = document.createElement('div');
        slide.className = `hero-slide ${silo.bgClass || ''}`;
        slide.innerHTML = `
            <h2>${silo.title}</h2>
            <div class="ticker" id="ticker-${silo.id}">${silo.tickerItems[0]}</div>
            <button class="cta-btn" onclick="navigateTo('${silo.ctaLink}')">${silo.ctaText}</button>
            <button class="cta-btn outline" onclick="alert('More ${silo.id} coming soon')">Quick View</button>
        `;
        heroTrack.appendChild(slide);
    });
    updateActiveSilo(0);
}

function updateActiveSilo(index) {
    const silo = siloData.silos[index];
    if (!silo) return;
    // Start ticker rotation
    let tickIdx = 0;
    const tickerEl = document.getElementById(`ticker-${silo.id}`);
    if (tickerEl && silo.tickerItems.length) {
        setInterval(() => { tickerEl.textContent = silo.tickerItems[tickIdx]; tickIdx = (tickIdx+1) % silo.tickerItems.length; }, 3000);
    }
    // Rebuild nested rows
    const container = document.getElementById('nestedContainer');
    container.innerHTML = '';
    if (silo.trending && silo.trending.length) container.appendChild(createNestedRow('Trending', silo.trending));
    if (silo.products && silo.products.length) container.appendChild(createNestedRow('New Drops', silo.products));
    container.appendChild(createNestedRow('Upcoming', [{name:'Mystery Drop',price:'$?',stripe:null},{name:'Limited Edition',price:'$?',stripe:null}]));
}

function createNestedRow(title, items) {
    const row = document.createElement('div');
    row.className = 'nested-row';
    row.innerHTML = `<h3>${title}</h3><div class="row-scroll" id="row-${title.replace(/\s/g,'')}"></div>`;
    const scroll = row.querySelector('.row-scroll');
    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'row-card';
        card.innerHTML = `
            <div style="font-size:2em;">${item.img||''}</div>
            <div>${item.name}</div>
            <div class="price">${item.price}</div>
            <button class="buy-btn" onclick="buyItem('${item.name}', '${item.stripe || ''}')">Buy</button>
        `;
        scroll.appendChild(card);
    });
    return row;
}

function buyItem(name, stripeUrl) {
    if (stripeUrl && stripeUrl !== 'null' && stripeUrl !== '') {
        window.location.href = stripeUrl;
    } else {
        alert(`Checkout for ${name}  add your Stripe link in the API data.`);
    }
}

// Avatar modal
function openAvatarModal() { document.getElementById('avatarModal').classList.add('active'); }
function closeAvatarModal() { document.getElementById('avatarModal').classList.remove('active'); }
function createAvatarNow() {
    const name = document.getElementById('avatarName').value.trim();
    if (!name) { alert('Enter a name'); return; }
    fetch('/api/avatar/create', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:'av_'+Date.now(), name, icon:'', tier:'Seed', items:[], userId:'visitor', created:new Date().toISOString()})
    }).then(() => { alert('Avatar created!'); closeAvatarModal(); }).catch(() => alert('Avatar saved locally.'));
    closeAvatarModal();
}

loadData();
</script>
</body>
</html>
