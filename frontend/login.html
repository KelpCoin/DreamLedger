<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Login</title>
<style>body{font-family:system-ui;padding:2rem;max-width:400px;margin:auto;background:#f5f5f5}input,button{width:100%;padding:0.75rem;margin:0.5rem 0;border-radius:0.5rem;border:1px solid #ccc}button{background:#d4af37;color:#000;font-weight:bold}</style></head>
<body><h1>Login</h1>
<form method="POST" action="/login">
  <input name="username" placeholder="Username" required>
  <input name="password" type="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>
<p>No account? <a href="register.html">Register</a></p>
</body></html>
