<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Register</title>
<style>body{font-family:system-ui;padding:2rem;max-width:400px;margin:auto;background:#f5f5f5}input,button{width:100%;padding:0.75rem;margin:0.5rem 0;border-radius:0.5rem;border:1px solid #ccc}button{background:#d4af37;color:#000;font-weight:bold;border:none}</style></head>
<body><h1>Create Account</h1>
<form method="POST" action="/signup">
  <input name="username" type="text" placeholder="Username" required>
  <input name="password" type="password" placeholder="Password" required>
  <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="login.html">Login</a></p>
</body></html>
