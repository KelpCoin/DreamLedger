<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Register</title>
<style>body{font-family:system-ui;padding:2rem;max-width:400px;margin:auto;background:#f5f5f5}input,button{width:100%;padding:0.75rem;margin:0.5rem 0;border-radius:0.5rem;border:1px solid #ccc}button{background:#d4af37;color:#000;font-weight:bold;border:none}.error{color:red}</style></head>
<body><h1>Create Account</h1><div id="error" class="error"></div><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button onclick="register()">Register</button><p>Already have an account? <a href="login.html">Login</a></p>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabase = window.supabase.createClient('', '');
  async function register(){const email=document.getElementById('email').value;const password=document.getElementById('password').value;const {error}=await supabase.auth.signUp({email,password});if(error)document.getElementById('error').textContent=error.message;else{alert('Check your email to confirm.');window.location.href='login.html'}}
</script></body></html>
