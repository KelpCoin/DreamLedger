<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>DreamLedger Signal</title>
<style>
body{background:#0b0b10;color:#eee;font-family:Arial;padding:40px}
.box{max-width:520px;margin:auto;background:#151520;padding:20px;border-radius:12px}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#7CFF6B;border:0;cursor:pointer;font-weight:bold}
small{opacity:0.7}
</style>
</head>
<body>
<div class="box">
<h2>Turn interest into listings</h2>
<small>Captured from SaaS / startup signals layer</small>

<input id="handle" placeholder="Reddit / Twitter handle"/>
<input id="intent" placeholder="What are you trying to sell?"/>
<input id="source" placeholder="Source (r/SaaS, r/startups...)"/>

<button onclick="submitLead()">Capture Lead</button>

</div>

<script>
async function submitLead(){
  await fetch("http://localhost:3000/lead",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      handle:document.getElementById("handle").value,
      intent:document.getElementById("intent").value,
      source:document.getElementById("source").value
    })
  });

  alert("Captured");
}
</script>
</body>
</html>
