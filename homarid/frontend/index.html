<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DreamLedger Marketplace</title>
  <style>
    body { font-family: system-ui; background: #0f0f0f; color: #f0f0f0; max-width: 600px; margin: 2rem auto; }
    input, button { padding: 0.5rem; margin: 0.25rem 0; }
  </style>
</head>
<body>
  <h1>DreamLedger Marketplace</h1>
  <h2>Create Listing</h2>
  <input id="title" placeholder="Title" /><br/>
  <input id="price" placeholder="Price (cents)" type="number" /><br/>
  <button onclick="createListing()">Create Listing</button>
  <h2>Recent Listings</h2>
  <div id="listings"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabase = window.supabase.createClient('https://your-project.supabase.co', 'your-real-anon-key');
    async function createListing() {
      const user = supabase.auth.user();
      if (!user) return alert("Login first");
      await supabase.from("listings").insert({
        seller_id: user.id,
        silo_id: (await supabase.from("silos").select("id").eq("slug","happyhomarid").single()).data.id,
        title: document.getElementById("title").value,
        price_cents: parseInt(document.getElementById("price").value)
      });
      alert("Listing created");
    }
    async function loadListings() {
      const { data } = await supabase.from("listings").select("*").eq("status","active");
      document.getElementById("listings").innerHTML = data.map(l =>
        `<div><b>${l.title}</b>  $${(l.price_cents/100).toFixed(2)}</div>`
      ).join("");
    }
    loadListings();
    setInterval(loadListings, 5000);
  </script>
</body>
</html>
