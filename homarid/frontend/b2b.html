<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DreamLedger B2B Marketplace</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui;background:#0f0f0f;color:#f0f0f0;max-width:900px;margin:2rem auto;padding:0 1rem}
    h1,h2{color:#f5c542}
    .section{background:#1a1a1a;border-radius:12px;padding:1.5rem;margin:1rem 0;border:1px solid #2a2a2a}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem}
    .card{background:#111;border-radius:12px;padding:1.5rem;border:1px solid #333}
    .card h3{color:#f5c542}
    .price{font-size:2rem;font-weight:700;margin:0.5rem 0}
    button{background:#f5c542;color:#0f0f0f;font-weight:700;border:none;padding:0.8rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem}
    button:hover{background:#ffd966}
    select,input{padding:0.6rem;border-radius:6px;border:1px solid #333;background:#222;color:#f0f0f0;margin:0.5rem 0}
    .user-info{padding:1rem;background:#111;border-radius:8px;margin-bottom:1rem}
  </style>
</head>
<body>
  <h1>DreamLedger B2B Marketplace</h1>
  <div id="auth-section" class="section">
    <div id="login-form">
      <h2>Login / Sign Up</h2>
      <input id="login-email" placeholder="Email" type="email"><br>
      <input id="login-password" placeholder="Password" type="password"><br>
      <button onclick="login()">Login</button>
      <button onclick="signup()">Sign Up</button>
    </div>
    <div id="user-info" style="display:none" class="user-info">
      <p>Logged in as <strong id="user-email"></strong> | <button onclick="logout()">Logout</button></p>
    </div>
  </div>

  <div class="section">
    <h2>Available Plans</h2>
    <select id="silo-filter" onchange="loadPlans()">
      <option value="">All Silos</option>
    </select>
    <div class="grid" id="plans-grid"></div>
  </div>

  <div class="section">
    <h2>My Subscriptions</h2>
    <div id="my-subs">Login to view your subscriptions.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wbwgroygjeyukkspnqiy.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_O5JRD67KaU3SA9dFq-JIuQ_Pzs8pedj';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentUser = null;
    let allSilos = [];

    async function init() {
      const { data: { user } } = await supabase.auth.getUser();
      currentUser = user;
      updateAuthUI();
      await loadSilos();
      await loadPlans();
      if (user) await loadMySubscriptions();
    }

    function updateAuthUI() {
      document.getElementById('login-form').style.display = currentUser ? 'none' : 'block';
      document.getElementById('user-info').style.display = currentUser ? 'block' : 'none';
      if (currentUser) {
        document.getElementById('user-email').textContent = currentUser.email;
      }
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) alert(error.message);
      else { currentUser = (await supabase.auth.getUser()).data.user; updateAuthUI(); await loadMySubscriptions(); }
    }

    async function signup() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) alert(error.message);
      else alert('Check your email to confirm signup.');
    }

    async function logout() {
      await supabase.auth.signOut();
      currentUser = null;
      updateAuthUI();
      document.getElementById('my-subs').innerHTML = 'Login to view your subscriptions.';
    }

    async function loadSilos() {
      const { data } = await supabase.from('silos').select('id,slug,name');
      allSilos = data || [];
      const filter = document.getElementById('silo-filter');
      filter.innerHTML = '<option value="">All Silos</option>';
      allSilos.forEach(function(s) {
        filter.innerHTML += '<option value="' + s.id + '">' + s.name + '</option>';
      });
    }

    async function loadPlans() {
      const siloId = document.getElementById('silo-filter').value;
      let query = supabase.from('b2b_plans').select('*').eq('active', true);
      if (siloId) {
        query = query.or('silo_id.eq.' + siloId + ',silo_id.is.null');
      }
      const { data: plans } = await query;
      const container = document.getElementById('plans-grid');
      container.innerHTML = (plans || []).map(function(p) {
        return '<div class="card">' +
          '<h3>' + p.name + '</h3>' +
          '<p>' + (p.description || '') + '</p>' +
          '<div class="price">$' + (p.price_cents/100).toFixed(2) + ' / ' + p.interval + '</div>' +
          '<p>' + (p.features || []).join(', ') + '</p>' +
          '<button onclick="subscribe(\'' + p.id + '\')">Subscribe</button>' +
          '</div>';
      }).join('');
    }

    async function subscribe(planId) {
      if (!currentUser) return alert('Login first');
      const siloId = document.getElementById('silo-filter').value || null;
      const { data, error } = await supabase.functions.invoke('b2b-checkout', {
        body: { plan_id: planId, user_id: currentUser.id, silo_id: siloId }
      });
      if (error) alert(error.message);
      else if (data.url) window.location.href = data.url;
      else alert('Checkout URL not returned');
    }

    async function loadMySubscriptions() {
      if (!currentUser) return;
      const { data: subs, error } = await supabase
        .from('b2b_subscriptions')
        .select('*, plan:plan_id(name, price_cents, interval), silo:silo_id(name)')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });
      if (error) { document.getElementById('my-subs').innerHTML = 'Error loading subscriptions.'; return; }
      const container = document.getElementById('my-subs');
      container.innerHTML = subs.length === 0
        ? 'No active subscriptions.'
        : subs.map(function(s) {
            return '<div class="card">' +
              '<h3>' + (s.plan?.name || 'Unknown Plan') + '</h3>' +
              '<p>Silo: ' + (s.silo?.name || 'Platform-wide') + '</p>' +
              '<p>Status: <strong>' + s.status + '</strong></p>' +
              '<p>Period: ' + (s.current_period_start?.split('T')[0] || '') + '  ' + (s.current_period_end?.split('T')[0] || '') + '</p>' +
              '</div>';
          }).join('');
    }

    init();
  </script>
</body>
</html>
